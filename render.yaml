services:
  - type: web
    name: solvist-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGIN
        value: "https://solvist.io,https://app.solvist.io,https://solvist-frontend.vercel.app"
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
                - key: SUPABASE_ANON_KEY
      sync: false
    - key: ENGINE_SECRET
      sync: false
