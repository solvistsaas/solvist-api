services:
  - type: web
    name: solvist-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker api:app --workers 2 --bind 0.0.0.0:$PORT --timeout 60 --graceful-timeout 30 --keep-alive 5
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ENGINE_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGIN
        value: "https://solvist-frontend.vercel.app,https://solvist.io,https://app.solvist.io"
